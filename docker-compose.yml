services:
  neo4j:
    image: neo4j:5
    container_name: multi-agent-graphrag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p devpassword 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: multi-agent-graphrag-backend
    ports:
      - "8000:8000"
    environment:
      CREDS_ENV_FILE: /app/cred-store/.env
    tmpfs:
      - /app/cred-store:size=64k,mode=0700
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multi-agent-graphrag-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
